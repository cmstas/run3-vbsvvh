sig_base_path: "/ceph/cms/store/user/aaarora/vbsvvh/preselection/latest/"
bkg_base_path: "/ceph/cms/store/user/aaarora/vbsvvh/preselection/latest/"
data_base_path: "/ceph/cms/store/user/aaarora/vbsvvh/preselection/latest/"

sig_path: ["*r2*1fj_sig*/*/*.root"]
bkg_path: ["*r2*1fj_bkg*/*/*.root"]
data_path: ["*r2*1fj_data*/*/*.root"]

training_features:
  - lepton_pt: log
  - lepton_eta: minmax
  - lepton_phi: minmax
  - lepton_mass: log
  - met_pt: log
  - met_phi: minmax
  - boosted_h_candidate_pt: log
  - boosted_h_candidate_eta: minmax
  - boosted_h_candidate_phi: minmax
  - boosted_h_candidate_part_mass: log
  - boosted_h_candidate_msoftdrop: log
  - boosted_h_candidate_tau21: none
  - boosted_v_candidate_pt: log
  - boosted_v_candidate_eta: minmax
  - boosted_v_candidate_phi: minmax
  - boosted_v_candidate_part_mass: log
  - boosted_v_candidate_msoftdrop: log
  - boosted_v_candidate_tau21: none
  - resolved_mjj_1: log
  - resolved_mjj_2: log
  - resolved_mjj_3: log
  - resolved_mjj_4: log
  - resolved_mjj_5: log
  - resolved_ptjj_1: log
  - resolved_ptjj_2: log
  - resolved_ptjj_3: log
  - resolved_ptjj_4: log
  - resolved_ptjj_5: log
  - resolved_dR_1: minmax
  - resolved_dR_2: minmax
  - resolved_dR_3: minmax
  - resolved_dR_4: minmax
  - resolved_dR_5: minmax
  - mlb_min: log

derived_vars:
  - resolved_mjj_1_residue_h: "np.where(resolved_mjj_1 > 0, np.abs(resolved_mjj_1 - 125.0), -999.0)"
  - resolved_mjj_1_residue_w: "np.where(resolved_mjj_1 > 0, np.abs(resolved_mjj_1 - 80.4), -999.0)"
  - resolved_mjj_1_residue_z: "np.where(resolved_mjj_1 > 0, np.abs(resolved_mjj_1 - 91.2), -999.0)"
  - resolved_mjj_2_residue_h: "np.where(resolved_mjj_2 > 0, np.abs(resolved_mjj_2 - 125.0), -999.0)"
  - resolved_mjj_2_residue_w: "np.where(resolved_mjj_2 > 0, np.abs(resolved_mjj_2 - 80.4), -999.0)"
  - resolved_mjj_2_residue_z: "np.where(resolved_mjj_2 > 0, np.abs(resolved_mjj_2 - 91.2), -999.0)"
  - resolved_mjj_3_residue_h: "np.where(resolved_mjj_3 > 0, np.abs(resolved_mjj_3 - 125.0), -999.0)"
  - resolved_mjj_3_residue_w: "np.where(resolved_mjj_3 > 0, np.abs(resolved_mjj_3 - 80.4), -999.0)"
  - resolved_mjj_3_residue_z: "np.where(resolved_mjj_3 > 0, np.abs(resolved_mjj_3 - 91.2), -999.0)"
  - resolved_mjj_4_residue_h: "np.where(resolved_mjj_4 > 0, np.abs(resolved_mjj_4 - 125.0), -999.0)"
  - resolved_mjj_4_residue_w: "np.where(resolved_mjj_4 > 0, np.abs(resolved_mjj_4 - 80.4), -999.0)"
  - resolved_mjj_4_residue_z: "np.where(resolved_mjj_4 > 0, np.abs(resolved_mjj_4 - 91.2), -999.0)"
  - resolved_mjj_5_residue_h: "np.where(resolved_mjj_5 > 0, np.abs(resolved_mjj_5 - 125.0), -999.0)"
  - resolved_mjj_5_residue_w: "np.where(resolved_mjj_5 > 0, np.abs(resolved_mjj_5 - 80.4), -999.0)"
  - resolved_mjj_5_residue_z: "np.where(resolved_mjj_5 > 0, np.abs(resolved_mjj_5 - 91.2), -999.0)"

auto_include_derived_vars: true
auto_include_derived_vars_transform: log

extra_vars:
  - weight
  - boosted_h_candidate_score
  - boosted_v_candidate_score
  - vbs_score

preselection: "(boosted_h_candidate_score >= 0.1) | (boosted_v_candidate_score >= 0.1)"

constraint_var: "vbs_detajj"

# VBS variables for the BDT. The BDT is trained to separate signal from background;
# its output (bdt_score) replaces constraint_var as the DNN decorrelation target.
# Set use_bdt_as_constraint: false to keep vbs_detajj as the constraint instead.
bdt_features:
  - vbs_mjj
  - vbs_detajj
  - vbs_jet1_pt
  - vbs_jet1_eta
  - vbs_jet1_phi
  - vbs_jet1_mass
  - vbs_jet2_pt
  - vbs_jet2_eta
  - vbs_jet2_phi
  - vbs_jet2_mass

use_bdt_as_constraint: true

bdt:
  n_estimators: 1000
  max_depth: 6
  learning_rate: 0.03
  min_child_weight: 20
  subsample: 0.8
  colsample_bytree: 0.7
  gamma: 1.0
  reg_lambda: 10.0
  reg_alpha: 0.0
  early_stopping_rounds: 40

batch_size: 16384
learning_rate: 0.0001
n_epochs: 1000

architecture: [64, 32, 16]
bce_weight: 1.0
disco_lambda: 10.0

use_batchnorm: true
dropout: 0.2
weight_decay: 0.01
label_smoothing: 0.0

devices: [4]

output: "output/1LEP_1FJ_RUN2"